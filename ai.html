        // Show toast

            textArea.value = text;

            textArea.select();
            try {
                document.execCommand('copy');
                const toast = document.getElementById('toast');
                toast.classList.remove('hidden');
                setTimeout(() => {
                    toast.classList.add('hidden');
                }, 1500);
            } catch (err) {
                console.error('복사 실패:', err);
            }
            document.body.removeChild(textArea);
        }

        function runStressSim() {
            const power = parseInt(document.getElementById('sim-power-slider').value);
            const fan = parseInt(document.getElementById('sim-fan-slider').value);

            document.getElementById('power-val').innerText = `${power}%`;
            document.getElementById('fan-val').innerText = fan === 40 ? `Auto (${fan}%)` : `수동 (${fan}%)`;

            // Temperature Calculation Algorithm
            let gpuTemp = 50 + (power * 0.3) - (fan * 0.12);
            let vramTemp = 60 + (power * 0.6) - (fan * 0.15);

            // Add backplate handicap if fan is low
            if (fan < 60) {
                vramTemp += (100 - fan) * 0.15;
            }

            // Generation Speed calculation (Lower power = slightly slower, but not much)
            let genSpeed = 5.0 + (100 - power) * 0.08;

            document.getElementById('gpu-temp-out').innerText = `${gpuTemp.toFixed(0)}°C`;
            document.getElementById('vram-temp-out').innerText = `${vramTemp.toFixed(0)}°C`;
            document.getElementById('gen-speed-out').innerText = `${genSpeed.toFixed(1)} 초/장`;
