<!doctype html>
<html lang="ko">

  <style>
    :root {
      --bg: #111111;
      --card: rgba(255,255,255,.94);
      --card-strong: rgba(255,255,255,.985);
      --text: #161616;
      --muted: #6b625a;
      --accent: #e86f3d;
      --accent-2: #1f7a5d;
      --line: rgba(0,0,0,.10);
      --shadow: 0 18px 58px rgba(0,0,0,.30);
      --safe-top: env(safe-area-inset-top, 0px);

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width:100%; height:100%; margin:0; background:#111; color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Segoe UI",sans-serif; overscroll-behavior:none; }
    body { overflow:hidden; }
    button, a { font: inherit; }
    button { border:0; }

    .app { position:relative; width:100vw; height:100dvh; background:var(--bg); overflow:hidden; isolation:isolate; }
    .mobile-frame { position:relative; width:min(100vw, 460px); height:100dvh; margin:0 auto; overflow:hidden; background:#151515; box-shadow:0 0 0 1px rgba(255,255,255,.05); }
    .topbar { position:fixed; top:0; left:50%; transform:translateX(-50%); width:min(100vw,460px); z-index:30; pointer-events:none; display:flex; justify-content:space-between; align-items:center; padding:calc(12px + var(--safe-top)) 16px 10px; }

    .deck { position:absolute; inset:0; transform:translate3d(0,0,0); transition:transform .34s cubic-bezier(.16,1,.3,1); will-change:transform; }
    .screen { position:relative; width:100%; height:100dvh; overflow:hidden; background:#10201c; }
    .map-link { position:absolute; inset:0; z-index:0; color:inherit; text-decoration:none; -webkit-user-drag:none; }
    .map-visual { position:absolute; inset:0; overflow:hidden; background:
        radial-gradient(circle at 50% 52%, rgba(232,111,61,.22) 0 1px, transparent 80px),

        linear-gradient(22deg, transparent 0 58%, rgba(255,255,255,.18) 58% 59.4%, transparent 59.4% 100%),

    .map-visual::before { content:""; position:absolute; inset:-20%; background:radial-gradient(circle at 18% 18%, rgba(112,198,146,.18), transparent 24%), radial-gradient(circle at 84% 32%, rgba(242,185,119,.16), transparent 24%), radial-gradient(circle at 52% 84%, rgba(255,255,255,.11), transparent 30%); mix-blend-mode:screen; opacity:.9; pointer-events:none; }
    .map-copy { position:absolute; left:18px; right:18px; top:calc(68px + var(--safe-top)); z-index:4; color:#fff; text-shadow:0 2px 18px rgba(0,0,0,.54); }
    .eyebrow { display:inline-flex; padding:8px 10px; border-radius:999px; background:rgba(0,0,0,.32); border:1px solid rgba(255,255,255,.16); backdrop-filter:blur(12px); font-size:11px; font-weight:900; letter-spacing:-.02em; }
    .map-copy h1 { margin:12px 0 5px; font-size:32px; line-height:.98; font-weight:950; letter-spacing:-.075em; }
    .map-copy p { margin:0; font-size:13px; font-weight:800; opacity:.92; }
    .station { position:absolute; left:50%; top:47%; transform:translate(-50%,-50%); width:96px; height:96px; border-radius:999px; background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.22); display:grid; place-items:center; backdrop-filter:blur(10px); box-shadow:0 12px 34px rgba(0,0,0,.20); }
    .station::before { content:"3"; width:34px; height:34px; border-radius:999px; display:grid; place-items:center; background:#f28f39; color:white; font-weight:950; box-shadow:0 10px 22px rgba(0,0,0,.25); }
    .station-label { position:absolute; top:calc(47% + 54px); left:50%; transform:translateX(-50%); padding:6px 10px; border-radius:999px; color:#fff; font-size:12px; font-weight:900; background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.16); backdrop-filter:blur(12px); white-space:nowrap; text-shadow:0 1px 8px rgba(0,0,0,.4); }
    .pin { position:absolute; left:calc(var(--pin-x) * 1%); top:calc(var(--pin-y) * 1%); transform:translate(-50%, -88%); width:48px; height:48px; border-radius:50% 50% 50% 8px; rotate:-45deg; background:linear-gradient(135deg,#ff8a55,#e24e2d); box-shadow:0 18px 34px rgba(0,0,0,.30); z-index:2; }
    .pin::after { content:""; position:absolute; width:18px; height:18px; border-radius:999px; background:#fff; inset:15px; box-shadow:inset 0 0 0 4px rgba(226,78,45,.12); }
    .pin-label { position:absolute; left:calc(var(--pin-x) * 1%); top:calc(var(--pin-y) * 1%); transform:translate(-50%,10px); z-index:3; padding:7px 10px; border-radius:999px; color:#fff; background:rgba(0,0,0,.42); border:1px solid rgba(255,255,255,.14); backdrop-filter:blur(10px); font-size:12px; font-weight:950; white-space:nowrap; }
    .map-tap { position:absolute; right:16px; top:calc(190px + var(--safe-top)); z-index:4; padding:10px 12px; border-radius:999px; color:#fff; background:rgba(0,0,0,.38); border:1px solid rgba(255,255,255,.18); backdrop-filter:blur(12px); font-size:12px; font-weight:950; }

    .sheet { position:absolute; left:10px; right:10px; bottom:calc(10px + var(--safe-bottom)); z-index:10; max-height:68dvh; overflow:hidden; padding:15px 13px 13px; border-radius:28px; background:var(--card); border:1px solid rgba(255,255,255,.60); box-shadow:var(--shadow); backdrop-filter:blur(22px); }
    .sheet-head { display:flex; gap:10px; align-items:flex-start; margin-bottom:9px; }
    .number { flex:0 0 auto; width:38px; height:38px; border-radius:14px; display:grid; place-items:center; background:#151515; color:#fff; font-size:14px; font-weight:950; }
    .title-wrap { min-width:0; }

    .chips { display:flex; gap:6px; overflow-x:auto; padding:0 0 9px; scrollbar-width:none; }

    .chip { flex:0 0 auto; display:inline-flex; align-items:center; min-height:28px; padding:7px 10px; border-radius:999px; background:rgba(0,0,0,.07); color:#46413d; font-size:11px; font-weight:900; letter-spacing:-.02em; white-space:nowrap; }

    .summary { margin:0 2px 10px; color:#4e4842; font-size:13px; line-height:1.37; font-weight:760; letter-spacing:-.025em; }

    .photo-head, .menu-head { display:flex; justify-content:space-between; align-items:center; color:#5e5a55; font-size:11px; font-weight:950; letter-spacing:-.02em; }

    .photo-strip { display:flex; gap:8px; margin:0 -4px 10px; padding:0 4px 2px; overflow-x:auto; scrollbar-width:none; touch-action:pan-x; scroll-snap-type:x mandatory; }
    .photo-tile { position:relative; flex:0 0 132px; height:84px; padding:0; overflow:hidden; border:0; border-radius:18px; background:#ded6ca; box-shadow:0 8px 18px rgba(0,0,0,.09); scroll-snap-align:start; cursor:pointer; }

    .photo-tile::after { content:""; position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.62), rgba(0,0,0,.08) 58%, rgba(0,0,0,0)); pointer-events:none; }
    .photo-tile b { position:absolute; left:9px; right:9px; bottom:8px; z-index:2; color:#fff; font-size:11px; line-height:1.12; font-weight:950; letter-spacing:-.025em; text-shadow:0 1px 8px rgba(0,0,0,.5); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .photo-tile em { position:absolute; top:7px; left:8px; z-index:2; min-width:22px; height:22px; display:inline-grid; place-items:center; padding:0 7px; border-radius:999px; color:#fff; background:rgba(0,0,0,.38); border:1px solid rgba(255,255,255,.18); backdrop-filter:blur(10px); font-size:10px; font-style:normal; font-weight:950; }
    .menu-head { margin:2px 4px 7px; }

    .actions { display:grid; grid-template-columns:1fr 78px; gap:8px; }
    .detail-btn, .naver-mini { display:flex; align-items:center; justify-content:center; min-height:48px; border-radius:18px; text-decoration:none; font-size:14px; font-weight:950; letter-spacing:-.03em; cursor:pointer; }
    .detail-btn { color:#fff; background:#151515; }
    .naver-mini { color:#fff; background:var(--accent-2); }

    .dots { position:fixed; right:calc(50% - min(50vw,230px) + 10px); top:50%; transform:translateY(-50%); z-index:28; display:flex; flex-direction:column; gap:7px; pointer-events:none; }
    .dot { width:6px; height:6px; border-radius:999px; background:rgba(255,255,255,.48); transition:.25s ease; box-shadow:0 1px 8px rgba(0,0,0,.3); }
    .dot.active { height:22px; background:#fff; }

    .menu-detail { position:fixed; inset:0; z-index:50; background:#f7f2ea; color:var(--text); transform:translateY(100%); transition:transform .34s cubic-bezier(.16,1,.3,1); display:flex; justify-content:center; }
    .menu-detail.active { transform:translateY(0); }
    .detail-inner { width:min(100vw,460px); height:100dvh; overflow-y:auto; padding:calc(16px + var(--safe-top)) 16px calc(22px + var(--safe-bottom)); }
    .detail-top { position:sticky; top:0; z-index:3; display:flex; align-items:center; justify-content:space-between; margin:-4px -4px 14px; padding:6px 4px 10px; background:linear-gradient(#f7f2ea 70%, rgba(247,242,234,0)); }
    .back-btn, .detail-count { display:inline-flex; align-items:center; justify-content:center; padding:10px 12px; border-radius:999px; background:rgba(0,0,0,.08); color:#161616; font-size:13px; font-weight:950; }
    .detail-title { padding:12px 2px 14px; }

    .menu-list { display:grid; gap:10px; }
    .menu-card { display:grid; gap:6px; padding:15px 14px; border-radius:22px; background:rgba(255,255,255,.76); border:1px solid rgba(0,0,0,.08); box-shadow:0 8px 26px rgba(0,0,0,.05); }
    .menu-card .row { display:flex; justify-content:space-between; gap:14px; align-items:baseline; }
    .menu-card h4 { margin:0; font-size:17px; line-height:1.22; letter-spacing:-.05em; font-weight:930; }

    .menu-card p { margin:0; color:#68625b; font-size:13px; line-height:1.38; font-weight:730; }

    .footnote { margin:16px 2px 4px; color:#786f65; font-size:11px; line-height:1.5; font-weight:700; letter-spacing:-.015em; }

    .lightbox { position:fixed; inset:0; z-index:80; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.94); color:#fff; touch-action:none; }
    .lightbox.active { display:flex; }
    .lightbox-inner { position:relative; width:min(100vw,460px); height:100dvh; display:grid; grid-template-rows:auto 1fr auto; padding:calc(13px + var(--safe-top)) 12px calc(14px + var(--safe-bottom)); }
    .lightbox-top { display:flex; justify-content:space-between; align-items:center; gap:10px; z-index:2; }

    .photo-nav { width:48px; height:48px; border-radius:999px; color:#fff; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.14); font-size:20px; font-weight:950; }

    @media (min-width:760px) {

      .meta-grid { gap:6px; margin-bottom:7px; }
      .meta { min-height:48px; padding:8px 9px; }
      .summary { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
      .photo-tile { flex-basis:118px; height:74px; border-radius:16px; }
      .photo-head { padding-bottom:5px; }
      .actions { grid-template-columns:1fr 70px; }

  </style>
</head>

    const deck = document.getElementById('deck');
    const frame = document.getElementById('frame');
    const dots = document.getElementById('dots');
    const currentIndexEl = document.getElementById('currentIndex');
    const totalCountEl = document.getElementById('totalCount');
    const menuDetail = document.getElementById('menuDetail');
    const detailName = document.getElementById('detailName');
    const detailIntro = document.getElementById('detailIntro');
    const detailMenuList = document.getElementById('detailMenuList');
    const detailMapLink = document.getElementById('detailMapLink');
    const detailCount = document.getElementById('detailCount');
    const backBtn = document.getElementById('backBtn');
    const photoLightbox = document.getElementById('photoLightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxName = document.getElementById('lightboxName');
    const lightboxCaption = document.getElementById('lightboxCaption');
    const lightboxCount = document.getElementById('lightboxCount');
    const closeLightboxBtn = document.getElementById('closeLightbox');
    const prevPhotoBtn = document.getElementById('prevPhoto');
    const nextPhotoBtn = document.getElementById('nextPhoto');

    let currentIndex = 0;
    let locked = false;
    let touchStartX = 0;
    let touchStartY = 0;
    let touchTarget = null;
    let activePhotoRestaurant = 0;
    let activePhotoIndex = 0;
    let lightboxStartX = 0;
    let lightboxStartY = 0;

    totalCountEl.textContent = restaurants.length;

    function esc(value) {
      return String(value).replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
    }

    function fallbackSrc(title, subtitle) {
      const safeTitle = esc(title);
      const safeSubtitle = esc(subtitle || '남부터미널 맛집');
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#2b4b3f"/><stop offset=".55" stop-color="#e86f3d"/><stop offset="1" stop-color="#141414"/>
          </linearGradient>
          <radialGradient id="r" cx="35%" cy="28%" r="62%"><stop offset="0" stop-color="#ffffff" stop-opacity=".28"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
        </defs>
        <rect width="640" height="420" fill="url(#g)"/>
        <rect width="640" height="420" fill="url(#r)"/>
        <circle cx="520" cy="70" r="86" fill="#fff" opacity=".10"/>
        <circle cx="108" cy="336" r="112" fill="#fff" opacity=".09"/>
        <rect x="44" y="44" width="552" height="332" rx="38" fill="#000" opacity=".18" stroke="#fff" stroke-opacity=".24"/>
        <text x="68" y="178" fill="#fff" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, Arial" font-size="44" font-weight="900" letter-spacing="-2">${safeTitle}</text>
        <text x="70" y="226" fill="#fff" opacity=".82" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, Arial" font-size="24" font-weight="800">${safeSubtitle}</text>
        <text x="70" y="306" fill="#fff" opacity=".58" font-family="Arial" font-size="18" font-weight="700">image URL fallback</text>
      </svg>`;
      return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
    }

    function photoImgHTML(photo, restName, number) {
      const fallback = fallbackSrc(photo.label, restName);
      return `<img src="${fallback}" data-remote-src="${esc(photo.url)}" alt="${esc(restName)} 관련 사진 ${number} - ${esc(photo.label)}" loading="lazy" referrerpolicy="no-referrer" data-fallback-title="${esc(photo.label)}" data-fallback-subtitle="${esc(restName)}" />`;
    }

    function loadRemoteImage(img) {
      const remote = img.dataset.remoteSrc;
      if (!remote || img.dataset.remoteRequested === '1') return;
      img.dataset.remoteRequested = '1';
      const tester = new Image();
      tester.referrerPolicy = 'no-referrer';
      let timedOut = false;
      const timer = window.setTimeout(() => { timedOut = true; }, 4500);
      tester.onload = () => {
        if (timedOut) return;
        window.clearTimeout(timer);
        img.src = remote;
        img.dataset.remoteLoaded = '1';
      };
      tester.onerror = () => window.clearTimeout(timer);
      tester.src = remote;
    }

    function hydrateRemoteImages() {
      const imgs = Array.from(document.querySelectorAll('img[data-remote-src]'));
      const visible = imgs.slice(0, 14);
      visible.forEach(loadRemoteImage);
      const rest = imgs.slice(14);
      const run = () => rest.forEach(loadRemoteImage);
      if ('requestIdleCallback' in window) requestIdleCallback(run, { timeout: 2500 });
      else window.setTimeout(run, 1200);
    }

    function chipHTML(items) {
      return items.slice(0, 5).map(item => `<span class="chip">${esc(item)}</span>`).join('');
    }

    function renderScreens() {
      deck.innerHTML = restaurants.map((r, index) => {
        const requested = r.requested ? `<small>${esc(r.requested)}</small>` : '';
        const photos = photoSets[r.slug] || [];
        const photoHTML = photos.map((photo, photoIndex) => `
          <button class="photo-tile" type="button" data-photo-restaurant="${index}" data-photo-index="${photoIndex}" aria-label="${esc(photo.label)} 전체 화면 보기">
            ${photoImgHTML(photo, r.name, photoIndex + 1)}
            <em>${photoIndex + 1}</em><b>${esc(photo.label)}</b>
          </button>
        `).join('');
        const menuTags = r.menus.map(m => `<span class="menu-pill">${esc(m.name)}</span>`).join('');
        return `
          <section class="screen" id="${esc(r.slug)}" style="--pin-x:${r.pin.x}; --pin-y:${r.pin.y};" data-index="${index}">
            <a class="map-link" href="${esc(r.mapUrl)}" target="_blank" rel="noopener" aria-label="${esc(r.name)} 네이버 지도 검색 열기">
              <div class="map-visual"></div>
              <div class="map-copy">
                <span class="eyebrow">지도 영역 탭 → 네이버 지도</span>
                <h1>${esc(r.name)}</h1>
                <p>${esc(r.mapNote)}</p>
              </div>
              <div class="station" aria-hidden="true"></div>
              <div class="station-label">남부터미널역</div>
              <div class="pin" aria-hidden="true"></div>
              <div class="pin-label">${esc(r.name)}</div>
              <span class="map-tap">지도 검색 ↗</span>
            </a>
            <article class="sheet" role="dialog" aria-label="${esc(r.name)} 요약 모달">
              <div class="sheet-head">
                <span class="number">${esc(r.order)}</span>
                <div class="title-wrap"><h2>${esc(r.name)}</h2>${requested}</div>
              </div>
              <div class="chips"><span class="chip primary">${esc(r.genre)}</span>${chipHTML(r.features)}</div>
              <div class="meta-grid">
                <div class="meta"><b>가격대</b><span>${esc(r.priceRange)}</span></div>
                <div class="meta"><b>영업</b><span>${esc(r.hours)}</span></div>
              </div>
              <p class="summary">${esc(r.recommendation)}</p>
              <div class="photo-head"><span>관련 사진</span><span>좌우 슬라이드 · 탭하면 전체화면</span></div>
              <div class="photo-strip" aria-label="관련 사진 슬라이드">${photoHTML}</div>
              <div class="menu-head"><span>대표 메뉴</span><span>추천 순서</span></div>
              <div class="menu-tags" aria-label="대표 메뉴 태그 목록">${menuTags}</div>
              <div class="actions">
                <button class="detail-btn" type="button" data-detail-index="${index}">메뉴 상세보기</button>
                <a class="naver-mini" href="${esc(r.mapUrl)}" target="_blank" rel="noopener" aria-label="${esc(r.name)} 네이버 지도 검색">지도</a>
              </div>
            </article>
          </section>`;
      }).join('');
      dots.innerHTML = restaurants.map((_, index) => `<span class="dot${index === 0 ? ' active' : ''}" data-dot="${index}"></span>`).join('');
    }

    function setPage(index, animate = true) {
      const next = Math.max(0, Math.min(restaurants.length - 1, index));
      if (next === currentIndex && animate) return;
      currentIndex = next;
      if (!animate) deck.style.transition = 'none'; else deck.style.transition = '';
      deck.style.transform = `translate3d(0, ${-currentIndex * 100}dvh, 0)`;
      currentIndexEl.textContent = String(currentIndex + 1);
      document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
      if (!animate) requestAnimationFrame(() => deck.style.transition = '');
      const screen = document.querySelector(`.screen[data-index="${currentIndex}"]`);
      if (screen) screen.querySelectorAll('img[data-remote-src]').forEach(loadRemoteImage);
    }

    function stepPage(direction) {
      if (locked) return;
      const next = Math.max(0, Math.min(restaurants.length - 1, currentIndex + direction));
      if (next === currentIndex) return;
      locked = true;
      setPage(next, true);
      window.setTimeout(() => locked = false, 390);
    }

    function openMenu(index) {
      const r = restaurants[index];
      detailName.textContent = r.name;
      detailIntro.textContent = `${r.genre} · ${r.priceRange}`;
      detailCount.textContent = `${String(index + 1).padStart(2, '0')} / ${restaurants.length}`;
      detailMapLink.href = r.mapUrl;
      detailMapLink.textContent = `${r.name} 네이버 지도에서 검색하기`;
      detailMenuList.innerHTML = r.menus.map(m => `
        <article class="menu-card">
          <div class="row"><h4>${esc(m.name)}</h4><strong>${esc(m.price)}</strong></div>
          <p>${esc(m.note)}</p>
        </article>`).join('');
      menuDetail.classList.add('active');
      menuDetail.setAttribute('aria-hidden', 'false');
    }

    function closeMenu() {
      menuDetail.classList.remove('active');
      menuDetail.setAttribute('aria-hidden', 'true');
    }

    function setLightboxPhoto() {
      const r = restaurants[activePhotoRestaurant];
      const set = photoSets[r.slug] || [];
      const p = set[activePhotoIndex];
      lightboxName.textContent = r.name;
      lightboxCaption.textContent = p.label;
      lightboxCount.textContent = `${activePhotoIndex + 1} / ${set.length}`;
      lightboxImg.src = fallbackSrc(p.label, r.name);
      lightboxImg.alt = `${r.name} 관련 사진 - ${p.label}`;
      const tester = new Image();
      tester.referrerPolicy = 'no-referrer';
      const token = `${activePhotoRestaurant}-${activePhotoIndex}-${Date.now()}`;
      lightboxImg.dataset.token = token;
      let timedOut = false;
      const timer = window.setTimeout(() => { timedOut = true; }, 4500);
      tester.onload = () => {
        if (timedOut || lightboxImg.dataset.token !== token) return;
        window.clearTimeout(timer);
        lightboxImg.src = p.url;
      };
      tester.onerror = () => window.clearTimeout(timer);
      tester.src = p.url;
    }

    function openLightbox(restaurantIndex, photoIndex) {
      activePhotoRestaurant = restaurantIndex;
      activePhotoIndex = photoIndex;
      setLightboxPhoto();
      photoLightbox.classList.add('active');
      photoLightbox.setAttribute('aria-hidden', 'false');
    }

    function closeLightbox() {
      photoLightbox.classList.remove('active');
      photoLightbox.setAttribute('aria-hidden', 'true');
    }

    function movePhoto(direction) {
      const r = restaurants[activePhotoRestaurant];
      const set = photoSets[r.slug] || [];
      activePhotoIndex = (activePhotoIndex + direction + set.length) % set.length;
      setLightboxPhoto();
    }

    renderScreens();
    setPage(0, false);
    hydrateRemoteImages();

    document.addEventListener('click', (event) => {
      const detailButton = event.target.closest('[data-detail-index]');
      if (detailButton) { event.preventDefault(); openMenu(Number(detailButton.dataset.detailIndex)); return; }
      const photoButton = event.target.closest('[data-photo-restaurant]');
      if (photoButton) { event.preventDefault(); event.stopPropagation(); openLightbox(Number(photoButton.dataset.photoRestaurant), Number(photoButton.dataset.photoIndex)); }
    });

    backBtn.addEventListener('click', closeMenu);
    closeLightboxBtn.addEventListener('click', closeLightbox);
    prevPhotoBtn.addEventListener('click', () => movePhoto(-1));
    nextPhotoBtn.addEventListener('click', () => movePhoto(1));

    frame.addEventListener('touchstart', (event) => {
      touchStartX = event.touches[0].clientX;
      touchStartY = event.touches[0].clientY;
      touchTarget = event.target;
    }, { passive:true });

    frame.addEventListener('touchend', (event) => {
      if (menuDetail.classList.contains('active') || photoLightbox.classList.contains('active')) return;
      const endX = event.changedTouches[0].clientX;
      const endY = event.changedTouches[0].clientY;
      const dx = endX - touchStartX;
      const dy = endY - touchStartY;
      if (touchTarget?.closest('.photo-strip, .menu-tags') && Math.abs(dx) > Math.abs(dy)) return;
      if (Math.abs(dy) > 56 && Math.abs(dy) > Math.abs(dx) * 1.1) stepPage(dy < 0 ? 1 : -1);
    }, { passive:true });

    window.addEventListener('wheel', (event) => {
      if (menuDetail.classList.contains('active') || photoLightbox.classList.contains('active')) return;
      if (Math.abs(event.deltaY) > 30) stepPage(event.deltaY > 0 ? 1 : -1);
    }, { passive:true });

    photoLightbox.addEventListener('touchstart', (event) => {
      lightboxStartX = event.touches[0].clientX;
      lightboxStartY = event.touches[0].clientY;
    }, { passive:true });

    photoLightbox.addEventListener('touchend', (event) => {
      const dx = event.changedTouches[0].clientX - lightboxStartX;
      const dy = event.changedTouches[0].clientY - lightboxStartY;
      if (Math.abs(dy) > 90 && dy > Math.abs(dx)) { closeLightbox(); return; }
      if (Math.abs(dx) > 54 && Math.abs(dx) > Math.abs(dy)) movePhoto(dx < 0 ? 1 : -1);
    }, { passive:true });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') { if (photoLightbox.classList.contains('active')) closeLightbox(); else closeMenu(); return; }
      if (photoLightbox.classList.contains('active')) {
        if (event.key === 'ArrowRight') movePhoto(1);
        if (event.key === 'ArrowLeft') movePhoto(-1);
        return;
      }
      if (!menuDetail.classList.contains('active')) {
        if (event.key === 'ArrowDown') stepPage(1);
        if (event.key === 'ArrowUp') stepPage(-1);
      }
    });

    window.addEventListener('resize', () => setPage(currentIndex, false));
  </script>
