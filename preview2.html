<!doctype html>
<html lang="ko">
<head>

<title>남부터미널역 500m 맛집</title>
<style>
:root {

  --green: #178866;
  --text: #151515;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#101512; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif; color:var(--text); }
body { position:fixed; inset:0; overscroll-behavior:none; }
button, a { font:inherit; color:inherit; }
button { border:0; background:none; padding:0; }
a { text-decoration:none; }
.app { position:fixed; inset:0; height:var(--vh); width:100vw; overflow:hidden; background:#0d1511; touch-action:none; }
.phone { position:relative; width:min(100vw, 461px); height:var(--vh); margin:0 auto; overflow:hidden; background:#183427; isolation:isolate; }
.screens { position:absolute; inset:0; overflow:hidden; }
.screen { position:absolute; inset:0; width:100%; height:100%; overflow:hidden; transform:translate3d(0, 100%, 0); transition:transform .46s cubic-bezier(.2,.88,.18,1); will-change:transform; background:#1d3a2c; pointer-events:none; }
.screen.active { pointer-events:auto; }
.noanim .screen { transition:none !important; }
.top { position:absolute; left:0; right:0; top:0; z-index:80; padding:calc(12px + var(--safe-top)) 16px 8px; display:flex; justify-content:space-between; align-items:center; pointer-events:none; color:#fff; }
.brand { display:flex; align-items:center; gap:8px; font-weight:950; font-size:15px; text-shadow:0 2px 16px rgba(0,0,0,.45); }
.brand b { width:30px; height:30px; border-radius:50%; display:grid; place-items:center; background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.24); }
.count { padding:8px 13px; border-radius:999px; background:rgba(0,0,0,.45); border:1px solid rgba(255,255,255,.14); font-weight:950; }
.dots { position:absolute; right:8px; top:50%; transform:translateY(-50%); z-index:85; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
.dot { width:6px; height:6px; border-radius:99px; background:rgba(255,255,255,.38); }
.dot.on { height:24px; background:#fff; }
.map { position:absolute; inset:0; overflow:hidden; background:

  linear-gradient(103deg, transparent 0 45%, rgba(255,255,255,.20) 45% 46.3%, transparent 46.3%),
  linear-gradient(20deg, transparent 0 54%, rgba(255,255,255,.18) 54% 55.8%, transparent 55.8%),
  linear-gradient(90deg, transparent 0 46%, rgba(255,255,255,.16) 46% 47%, transparent 47%),
  linear-gradient(0deg, transparent 0 49%, rgba(255,255,255,.14) 49% 50%, transparent 50%),
  repeating-linear-gradient(90deg, rgba(255,255,255,.055) 0 1px, transparent 1px 45px),
  repeating-linear-gradient(0deg, rgba(255,255,255,.055) 0 1px, transparent 1px 45px),
  linear-gradient(135deg, #17382b, #31513f 58%, #10231e); }
.map::after { content:""; position:absolute; inset:-20%; background:radial-gradient(circle at 18% 15%, rgba(174,224,184,.16), transparent 26%), radial-gradient(circle at 90% 25%, rgba(255,206,122,.12), transparent 24%); mix-blend-mode:screen; }
.map-hit { position:absolute; inset:0; z-index:8; cursor:pointer; }
.map-title { position:absolute; left:22px; top:calc(82px + var(--safe-top)); right:22px; color:#fff; z-index:9; text-shadow:0 2px 18px rgba(0,0,0,.5); pointer-events:none; }
.map-title .small { display:inline-flex; padding:8px 12px; border-radius:999px; background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.18); font-size:12px; font-weight:950; margin-bottom:15px; }
.map-title h1 { margin:0 0 8px; font-size:clamp(34px,9vw,48px); line-height:.94; letter-spacing:-.08em; font-weight:950; }
.map-title p { margin:0; font-size:13px; font-weight:850; opacity:.95; }
.station { position:absolute; left:50%; top:38%; z-index:2; transform:translate(-50%,-50%); width:78px; height:78px; border-radius:999px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); display:grid; place-items:center; pointer-events:none; }
.station::before { content:"3"; width:34px; height:34px; border-radius:999px; display:grid; place-items:center; background:#f28c39; color:white; font-weight:950; }
.station-label { position:absolute; left:50%; top:calc(38% + 43px); transform:translateX(-50%); z-index:3; color:#fff; background:rgba(0,0,0,.36); border:1px solid rgba(255,255,255,.15); border-radius:999px; padding:5px 9px; font-size:11px; font-weight:900; pointer-events:none; }
.pin { position:absolute; left:calc(var(--x)*1%); top:calc(var(--y)*1%); z-index:4; width:42px; height:42px; transform:translate(-50%,-100%); filter:drop-shadow(0 15px 18px rgba(0,0,0,.3)); pointer-events:none; }
.pin::before { content:""; position:absolute; inset:0; border-radius:50% 50% 50% 0; transform:rotate(-45deg); background:var(--accent); border:3px solid #fff; }
.pin::after { content:""; position:absolute; left:50%; top:50%; width:9px; height:9px; border-radius:99px; background:#fff; transform:translate(-50%,-74%); }
.pin-name { position:absolute; left:calc(var(--x)*1%); top:calc(var(--y)*1%); z-index:5; transform:translate(-50%,5px); max-width:210px; color:#fff; background:rgba(0,0,0,.46); border:1px solid rgba(255,255,255,.16); border-radius:999px; padding:7px 10px; font-size:11px; font-weight:950; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; pointer-events:none; }
.map-cta { position:absolute; right:16px; bottom:calc(var(--collapsed-card) + 28px + var(--safe-bottom)); z-index:9; color:#fff; background:rgba(0,0,0,.36); border:1px solid rgba(255,255,255,.18); border-radius:999px; padding:10px 13px; font-size:12px; font-weight:950; pointer-events:none; }
.screen.expanded .map-cta { opacity:0; }
.card { position:absolute; left:12px; right:12px; bottom:calc(12px + var(--safe-bottom)); z-index:40; height:var(--collapsed-card); max-height:calc(var(--vh) - 62px - var(--safe-top)); border-radius:30px; background:rgba(255,255,255,.975); border:1px solid rgba(255,255,255,.82); box-shadow:0 18px 56px rgba(0,0,0,.33); backdrop-filter:blur(26px); overflow:hidden; padding:10px 14px 14px; display:flex; flex-direction:column; transition:height .32s cubic-bezier(.2,.88,.18,1), border-radius .24s ease; }
.screen.expanded .card { height:var(--expanded-card); border-radius:28px; }
.handle { height:18px; display:grid; place-items:center; flex:0 0 auto; cursor:pointer; }
.handle::before { content:""; width:42px; height:4px; border-radius:99px; background:rgba(0,0,0,.18); }
.head { display:flex; gap:10px; align-items:center; min-height:50px; flex:0 0 auto; }
.num { width:42px; height:42px; border-radius:16px; display:grid; place-items:center; background:#111; color:#fff; font-weight:950; flex:0 0 auto; }
.title { flex:1; min-width:0; }
.title-line { display:flex; align-items:center; gap:7px; min-width:0; }
h2 { margin:0; font-size:22px; line-height:1.05; letter-spacing:-.07em; font-weight:950; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.genre { flex:0 0 auto; max-width:106px; padding:6px 8px; border-radius:999px; background:#fdebe4; color:#b24c25; font-size:11px; font-weight:950; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hours { margin-top:4px; color:#666; font-size:11px; font-weight:850; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.toggle { width:58px; height:34px; border-radius:999px; background:#111; color:#fff; font-size:12px; font-weight:950; flex:0 0 auto; cursor:pointer; }
.content { min-height:0; flex:1; overflow:hidden; padding-top:7px; display:flex; flex-direction:column; }
.screen.expanded .content { overflow-y:auto; overscroll-behavior:contain; }
.desc { margin:0 2px 7px; color:#444; font-size:13px; line-height:1.28; font-weight:850; letter-spacing:-.035em; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; flex:0 0 auto; }
.chips, .menus { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; flex:0 0 auto; }

.chip { flex:0 0 auto; padding:8px 10px; border-radius:999px; background:#f0f0f0; color:#4f4f4f; font-size:11px; font-weight:950; white-space:nowrap; }

.label-row .hint { color:#bc6a38; }

.actions { display:flex; gap:10px; padding-top:13px; flex:0 0 auto; }

.action-map { width:96px; height:54px; border-radius:24px; display:grid; place-items:center; background:var(--green); color:#fff; font-size:16px; font-weight:950; }
.detailPanel, .viewer { position:absolute; inset:0; z-index:160; background:#fff; transform:translateY(105%); transition:transform .32s cubic-bezier(.2,.88,.18,1); overflow:auto; padding:calc(16px + var(--safe-top)) 18px calc(28px + var(--safe-bottom)); }
.detailPanel.show, .viewer.show { transform:translateY(0); }
.back, .close { width:42px; height:42px; border-radius:999px; background:#111; color:#fff; font-size:22px; font-weight:950; }
.detailPanel h3 { margin:22px 0 10px; font-size:30px; letter-spacing:-.07em; }
.menu-card { border:1px solid #eee; border-radius:20px; padding:16px; margin:10px 0; background:#fafafa; }
.menu-card h4 { margin:0 0 6px; font-size:18px; }
.viewer { background:#050505; color:#fff; overflow:hidden; display:flex; flex-direction:column; }
.viewer-top { display:flex; justify-content:space-between; align-items:center; flex:0 0 auto; }
.viewer-img-wrap { flex:1; display:grid; place-items:center; min-height:0; }
.viewer img { max-width:100%; max-height:78vh; border-radius:22px; object-fit:contain; background:#222; }
.viewer-cap { display:flex; justify-content:space-between; gap:12px; padding:14px 4px; font-weight:850; flex:0 0 auto; }
@media (max-height:720px) {

  .map-title { top:calc(64px + var(--safe-top)); }
  .map-title h1 { font-size:34px; }
  .desc { -webkit-line-clamp:1; font-size:12px; }
  .photos { height:116px; min-height:116px; flex-basis:116px; }
  .photo { height:108px; flex-basis:154px; }
  .actions { display:none; }
}

const app=document.getElementById('app'), phone=document.getElementById('phone'), screens=document.getElementById('screens'), dots=document.getElementById('dots'), cur=document.getElementById('cur');
const detail=document.getElementById('detail'), detailTitle=document.getElementById('detailTitle'), detailIntro=document.getElementById('detailIntro'), detailMenus=document.getElementById('detailMenus'), detailMap=document.getElementById('detailMap');
const viewer=document.getElementById('viewer'), viewerTitle=document.getElementById('viewerTitle'), viewerImg=document.getElementById('viewerImg'), viewerCap=document.getElementById('viewerCap'), viewerCnt=document.getElementById('viewerCnt');
let active=0, sx=0, sy=0, startTarget=null, lastMove=0, vRest=0, vPhoto=0;
const paramScreen=Number(new URLSearchParams(location.search).get('screen'));
if(Number.isFinite(paramScreen)&&paramScreen>0) active=Math.min(data.length-1,paramScreen);
function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function setVH(){document.documentElement.style.setProperty('--vh', Math.round(window.innerHeight||document.documentElement.clientHeight)+'px');}
function render(){
  screens.innerHTML=data.map((r,i)=>`<section class="screen" data-i="${i}" style="--x:${r.pin[0]};--y:${r.pin[1]}"><div class="map"></div><button class="map-hit" data-map="${i}"></button><div class="map-title"><span class="small">지도 영역 탭 → 네이버 지도</span><h1>${esc(r.name)}</h1><p>${esc(r.mapNote)}</p></div><div class="station"></div><div class="station-label">남부터미널역</div><div class="pin"></div><div class="pin-name">${esc(r.name)}</div><div class="map-cta">지도 검색 ↗</div><article class="card" data-card="${i}"><button class="handle" data-toggle="${i}" aria-label="펼치기"></button><div class="head"><span class="num">${r.order}</span><div class="title"><div class="title-line"><h2>${esc(r.name)}</h2><span class="genre">${esc(r.genre)}</span></div><div class="hours">${esc(r.hours)}</div></div><button class="toggle" data-toggle="${i}">펼치기</button></div><div class="content"><p class="desc">${esc(r.note)}</p><div class="chips"><span class="chip price">가격 ${esc(r.price)}</span>${r.features.map(f=>`<span class="chip">${esc(f)}</span>`).join('')}</div><div class="label-row"><span>관련 사진</span><span class="hint">좌우 슬라이드 · 탭하면 전체화면</span></div><div class="photos" data-noswipe>${r.photos.map((p,pi)=>`<button class="photo" data-photo="${i}:${pi}"><img data-src="${p.url}" alt="${esc(p.label)}" loading="lazy" decoding="async"><em>${pi+1}</em><b>${esc(p.label)}</b></button>`).join('')}</div><div class="label-row"><span>대표 메뉴</span><span class="hint">추천 순서</span></div><div class="menus">${r.menus.map(m=>`<span class="menu-pill">${esc(m)}</span>`).join('')}</div><div class="actions"><button class="action-main" data-detail="${i}">메뉴 상세보기</button><a class="action-map" href="${r.mapUrl}" target="_blank" rel="noopener">지도</a></div></div></article></section>`).join('');
  dots.innerHTML=data.map((_,i)=>`<span class="dot ${i===active?'on':''}"></span>`).join(''); layout(true);
}
function hydrateImages(i){
  const root=document.querySelector(`.screen[data-i="${i}"]`);
  if(!root) return;
  root.querySelectorAll('img[data-src]').forEach(img=>{
    if(!img.getAttribute('src')) img.setAttribute('src', img.dataset.src);
  });
}
function layout(noanim=false){
  if(noanim) phone.classList.add('noanim'); else phone.classList.remove('noanim');
  document.querySelectorAll('.screen').forEach((el,i)=>{el.style.transform=`translate3d(0, ${(i-active)*100}%, 0)`; el.classList.toggle('active',i===active); if(i!==active) expand(i,false);});
  cur.textContent=active+1; [...dots.children].forEach((d,i)=>d.classList.toggle('on',i===active));
  hydrateImages(active);
  if(noanim) requestAnimationFrame(()=>phone.classList.remove('noanim'));
}
function go(i){i=Math.max(0,Math.min(data.length-1,i)); if(i===active)return; expand(active,false); active=i; layout(false);}
function expand(i,on){const s=document.querySelector(`.screen[data-i="${i}"]`); if(!s)return; s.classList.toggle('expanded',!!on); s.querySelectorAll('.toggle').forEach(b=>b.textContent=on?'접기':'펼치기');}
function toggle(i){const s=document.querySelector(`.screen[data-i="${i}"]`); expand(i,!s.classList.contains('expanded'));}
function overlay(){return detail.classList.contains('show')||viewer.classList.contains('show');}
function allowPage(target){return !overlay() && !target.closest('[data-noswipe], .viewer, .detailPanel, .action-main, .action-map');}
function openDetail(i){const r=data[i]; detailTitle.textContent=r.name; detailIntro.textContent=`${r.genre} · ${r.price} · ${r.hours}`; detailMap.href=r.mapUrl; detailMenus.innerHTML=r.menus.map((m,idx)=>`<div class="menu-card"><h4>${esc(m)}</h4><p>대표 메뉴 순서 ${idx+1}번입니다. 실제 가격은 방문 전 확인해 주세요.</p></div>`).join(''); detail.classList.add('show');}
function openPhoto(i,p){const r=data[i], ph=r.photos[p]; vRest=i; vPhoto=p; viewerTitle.textContent=r.name; const thumb=document.querySelector(`[data-photo="${i}:${p}"] img`); const src=(thumb&&thumb.currentSrc)||ph.url; viewerImg.removeAttribute('src'); viewerImg.src=src; viewerCap.textContent=ph.label; viewerCnt.textContent=`${p+1} / ${r.photos.length}`; viewer.classList.add('show');}
app.addEventListener('pointerdown',e=>{sx=e.clientX; sy=e.clientY; startTarget=e.target;},{passive:true});
app.addEventListener('pointerup',e=>{const dx=e.clientX-sx, dy=e.clientY-sy; if(!allowPage(startTarget)) return; if(Math.abs(dy)>58 && Math.abs(dy)>Math.abs(dx)*1.12){lastMove=Date.now()+360; go(active+(dy<0?1:-1));}},{passive:true});
app.addEventListener('wheel',e=>{if(!allowPage(e.target))return; if(Math.abs(e.deltaY)<24 || Math.abs(e.deltaY)<Math.abs(e.deltaX))return; e.preventDefault(); if(Date.now()<lastMove)return; lastMove=Date.now()+470; go(active+(e.deltaY>0?1:-1));},{passive:false});
document.addEventListener('click',e=>{
  if(Date.now()<lastMove){e.preventDefault(); e.stopPropagation(); return;}
  const m=e.target.closest('[data-map]'); if(m){const i=+m.dataset.map; const s=m.closest('.screen'); if(s.classList.contains('expanded')) expand(i,false); else window.open(data[i].mapUrl,'_blank','noopener'); return;}
  const t=e.target.closest('[data-toggle]'); if(t){e.preventDefault(); toggle(+t.dataset.toggle); return;}
  const d=e.target.closest('[data-detail]'); if(d){e.preventDefault(); openDetail(+d.dataset.detail); return;}
  const ph=e.target.closest('[data-photo]'); if(ph){e.preventDefault(); const [ri,pi]=ph.dataset.photo.split(':').map(Number); openPhoto(ri,pi); return;}
  if(e.target.closest('[data-close-detail]')) detail.classList.remove('show');
  if(e.target.closest('[data-close-viewer]')) viewer.classList.remove('show');
});
let psx=0,psy=0; viewer.addEventListener('pointerdown',e=>{psx=e.clientX;psy=e.clientY;},{passive:true}); viewer.addEventListener('pointerup',e=>{const dx=e.clientX-psx,dy=e.clientY-psy;if(Math.abs(dx)>52&&Math.abs(dx)>Math.abs(dy)){const r=data[vRest];vPhoto=(vPhoto+(dx<0?1:-1)+r.photos.length)%r.photos.length;openPhoto(vRest,vPhoto);} if(dy>90&&Math.abs(dy)>Math.abs(dx)) viewer.classList.remove('show');},{passive:true});
window.addEventListener('resize',()=>{setVH();layout(true);});
setVH(); render();
</script>
</body>
</html>
