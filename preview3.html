      <button class="handle" data-toggle="${i}" aria-label="카드 펼치기"></button>
      <div class="sheet-head">
        <span class="number">${r.order}</span>
        <div class="title-wrap"><div class="title-row"><h2>${r.name}</h2><span class="genre">${r.genre}</span></div><div class="subline">${r.requested?'요청명: '+r.requested+' · ':''}${r.hours}</div></div>
        <button class="expand" data-toggle="${i}">펼치기</button>
      </div>
      <div class="body">
        <p class="reco">${r.recommendation}</p>
        <div class="chips"><span class="chip price">가격 ${r.priceRange}</span>${r.features.map(f=>`<span class="chip">${f}</span>`).join('')}</div>
        <div class="section"><span>관련 사진</span><span class="hint">좌우 슬라이드 · 탭하면 전체화면</span></div>
        <div class="photos">${r.photos.map((p,pi)=>`<button class="photo" data-photo-r="${i}" data-photo-p="${pi}"><img src="${p.fallback}" data-src="${p.url}" referrerpolicy="no-referrer" loading="lazy" alt="${esc(p.label)}"><em>${pi+1}</em><b>${p.label}</b></button>`).join('')}</div>
        <div class="section"><span>대표 메뉴</span><span class="hint">추천 순서</span></div>
        <div class="menus">${r.menus.map(m=>`<span class="menu-pill">${m}</span>`).join('')}</div>
        <div class="actions"><button class="detail" data-detail="${i}">메뉴 상세보기</button><a class="mapbtn" href="${r.mapUrl}" target="_blank" rel="noopener">지도</a></div>
      </div>
    </article>
  </section>`).join('');
  dots.innerHTML=restaurants.map((_,i)=>`<span class="dot ${i===0?'active':''}"></span>`).join('');
  hydrateImages();
}
function hydrateImages(){setTimeout(()=>{document.querySelectorAll('img[data-src]').forEach(img=>{const url=img.dataset.src;if(!url)return;const probe=new Image();probe.referrerPolicy='no-referrer';probe.onload=()=>{img.src=url};probe.onerror=()=>{};probe.src=url;});},80)}
function update(anim=true){if(!anim){track.classList.add('noanim')}document.documentElement.style.setProperty('--active',active);current.textContent=active+1;[...dots.children].forEach((d,i)=>d.classList.toggle('active',i===active));if(!anim){requestAnimationFrame(()=>track.classList.remove('noanim'))}}
function go(n){const now=Date.now();if(now-lastGo<300)return;const nextIndex=Math.max(0,Math.min(restaurants.length-1,n));if(nextIndex===active)return;lastGo=now;active=nextIndex;update(true)}
function setExpanded(i,expanded){const s=track.querySelector(`.screen[data-index="${i}"]`);if(!s)return;s.classList.toggle('expanded',expanded);s.querySelectorAll('[data-toggle]').forEach(b=>{if(b.classList.contains('expand'))b.textContent=expanded?'접기':'펼치기';b.setAttribute('aria-label',expanded?'카드 접기':'카드 펼치기')})}
function toggleSheet(i){const s=track.querySelector(`.screen[data-index="${i}"]`);setExpanded(i,!s.classList.contains('expanded'))}
function openDetail(i){const r=restaurants[i];detailTitle.textContent=r.name;detailIntro.textContent=`${r.genre} · ${r.priceRange} · ${r.hours}`;detailMap.href=r.mapUrl;detailMenus.innerHTML=r.menus.map((m,idx)=>`<article class="menu-card"><div class="row"><h4>${m}</h4><strong>${idx===0?'대표':'추천'}</strong></div><p>${r.name}의 대표 메뉴 순서 ${idx+1}번입니다. 가격은 방문 전 네이버 지도 또는 매장에서 확인해 주세요.</p></article>`).join('');detailPanel.classList.add('active')}
function closeDetail(){detailPanel.classList.remove('active')}
function showPhoto(){const r=restaurants[viewerR],p=r.photos[viewerP];viewerTitle.textContent=r.name;viewerCaption.textContent=p.label;viewerCount.textContent=`${viewerP+1} / ${r.photos.length}`;viewerImg.onerror=()=>{viewerImg.onerror=null;viewerImg.src=p.fallback};viewerImg.src=p.fallback;const probe=new Image();probe.referrerPolicy='no-referrer';probe.onload=()=>{viewerImg.src=p.url};probe.onerror=()=>{};probe.src=p.url}
function openPhoto(r,p){viewerR=r;viewerP=p;showPhoto();viewer.classList.add('active')}
function closePhoto(){viewer.classList.remove('active')}
function stepPhoto(d){const total=restaurants[viewerR].photos.length;viewerP=(viewerP+d+total)%total;showPhoto()}
function isOverlayActive(){return detailPanel.classList.contains('active')||viewer.classList.contains('active')}
function shouldPageSwipe(target,dx,dy){if(isOverlayActive())return false;if(Math.abs(dy)<64||Math.abs(dy)<=Math.abs(dx)*1.12)return false;const screen=track.querySelector(`.screen[data-index="${active}"]`);const expanded=screen&&screen.classList.contains('expanded');if(expanded&&target.closest('.sheet'))return false;return true}
render();setHeight();update(false);window.addEventListener('resize',()=>{setHeight();update(false)});if(window.visualViewport){window.visualViewport.addEventListener('resize',()=>{setHeight();update(false)})}
frame.addEventListener('touchstart',e=>{if(isOverlayActive())return;const t=e.touches[0];startX=t.clientX;startY=t.clientY;startTarget=e.target;locked=false},{passive:true});
frame.addEventListener('touchmove',e=>{if(isOverlayActive())return;const t=e.touches[0];const dx=t.clientX-startX,dy=t.clientY-startY;if(shouldPageSwipe(startTarget,dx,dy)){e.preventDefault();locked=true}}, {passive:false});
frame.addEventListener('touchend',e=>{if(isOverlayActive())return;const t=e.changedTouches[0];const dx=t.clientX-startX,dy=t.clientY-startY;if(shouldPageSwipe(startTarget,dx,dy)){suppressClick=Date.now()+450;go(active+(dy<0?1:-1))}}, {passive:true});
frame.addEventListener('wheel',e=>{if(isOverlayActive())return;if(Math.abs(e.deltaY)<=Math.abs(e.deltaX))return;e.preventDefault();const screen=track.querySelector(`.screen[data-index="${active}"]`);if(screen&&screen.classList.contains('expanded')&&e.target.closest('.sheet'))return;if(locked)return;locked=true;go(active+(e.deltaY>0?1:-1));setTimeout(()=>locked=false,520)}, {passive:false});
document.addEventListener('click',e=>{if(Date.now()<suppressClick){e.preventDefault();e.stopPropagation();return}
 const map=e.target.closest('.map-hit');if(map){e.preventDefault();e.stopPropagation();const i=Number(map.dataset.map);const screen=map.closest('.screen');if(screen&&screen.classList.contains('expanded')){setExpanded(i,false)}else{window.open(restaurants[i].mapUrl,'_blank','noopener')}return}
 const toggle=e.target.closest('[data-toggle]');if(toggle){e.preventDefault();e.stopPropagation();toggleSheet(Number(toggle.dataset.toggle));return}
 const ph=e.target.closest('[data-photo-r]');if(ph){e.preventDefault();e.stopPropagation();openPhoto(Number(ph.dataset.photoR),Number(ph.dataset.photoP));return}
 const det=e.target.closest('[data-detail]');if(det){e.preventDefault();e.stopPropagation();openDetail(Number(det.dataset.detail));return}
 const sheet=e.target.closest('.sheet');if(sheet&&!sheet.closest('.screen').classList.contains('expanded')&&!e.target.closest('.photos,.menus,.chips,.actions')){e.preventDefault();setExpanded(Number(sheet.dataset.sheet),true);return}
});
detailBack.onclick=closeDetail;viewerClose.onclick=closePhoto;prev.onclick=()=>stepPhoto(-1);next.onclick=()=>stepPhoto(1);
let vx=0,vy=0;stage.addEventListener('touchstart',e=>{vx=e.touches[0].clientX;vy=e.touches[0].clientY},{passive:true});stage.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-vx,dy=e.changedTouches[0].clientY-vy;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>44)stepPhoto(dx<0?1:-1);if(dy>90&&Math.abs(dy)>Math.abs(dx))closePhoto()},{passive:true});
document.addEventListener('keydown',e=>{if(viewer.classList.contains('active')){if(e.key==='Escape')closePhoto();if(e.key==='ArrowRight')stepPhoto(1);if(e.key==='ArrowLeft')stepPhoto(-1);return}if(detailPanel.classList.contains('active')){if(e.key==='Escape')closeDetail();return}if(e.key==='ArrowDown'||e.key==='PageDown'){e.preventDefault();go(active+1)}if(e.key==='ArrowUp'||e.key==='PageUp'){e.preventDefault();go(active-1)}});
</script>
</body>
</html>
